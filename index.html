<!DOCTYPE html>
<html lang="zh-HK">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>小五英文默書練習 - 寬畫布版</title>
    <script src="https://cdn.jsdelivr.net/npm/tesseract.js@5/dist/tesseract.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f0f8ff;
            color: #333;
            margin: 0;
            padding: 20px;
        }
        h1 {
            text-align: center;
            color: #0056b3;
        }
        .container {
            max-width: 1200px; /* 增加總寬度以適應更寬的畫布 */
            margin: 0 auto;
            background: white;
            padding: 20px;
            border-radius: 10px;
            box-shadow: 0 4px 8px rgba(0,0,0,0.1);
            overflow-x: auto; /* 確保窄螢幕可滑動 */
        }
        table {
            width: 100%;
            border-collapse: collapse;
            margin-bottom: 20px;
            min-width: 900px; /* 增加表格最小寬度 */
        }
        th, td {
            border: 2px solid #b3d4fc;
            padding: 15px 10px;
            text-align: center;
            vertical-align: middle;
        }
        th {
            background-color: #e6f2ff;
            font-size: 18px;
        }
        .tools button {
            background-color: #fff;
            border: 1px solid #ccc;
            border-radius: 5px;
            padding: 8px;
            margin: 2px;
            cursor: pointer;
            font-size: 18px;
            transition: 0.2s;
        }
        .tools button:hover { background-color: #f0f0f0; }
        .tools button.active {
            background-color: #cce5ff;
            border-color: #0056b3;
            box-shadow: 0 0 5px rgba(0,86,179,0.5);
        }
        .canvas-area {
            display: flex;
            gap: 15px;
            justify-content: center;
            align-items: center;
            flex-wrap: wrap; /* 窄螢幕下換行 */
        }
        .word-group {
            display: flex;
            align-items: center;
            gap: 5px;
        }
        .canvas-wrapper {
            position: relative;
            width: 350px; /* --- 已加闊 --- */
            height: 120px; /* 3個40px的間距 = 120px */
            background-color: #fff;
            border-radius: 4px;
            overflow: hidden;
        }
        /* 四線譜設計 */
        .stave-line {
            position: absolute;
            left: 0;
            width: 100%;
            border-top: 2px solid;
            z-index: 1;
            pointer-events: none;
        }
        .stave-line.red { border-color: #ff9999; }
        .stave-line.blue { border-color: #9999ff; border-top-style: dashed; }
        
        canvas {
            position: absolute;
            top: 0;
            left: 0;
            z-index: 2;
            cursor: crosshair;
            touch-action: none; /* 防止手機繪圖時滑動螢幕 */
        }
        .mark {
            font-size: 24px;
            width: 30px;
            display: inline-block;
        }
        .correct-answer-cell {
            font-size: 22px;
            font-weight: bold;
            color: #28a745;
            letter-spacing: 1px;
        }
        .answer-hidden { display: none; }
        
        .controls {
            display: flex;
            justify-content: center;
            gap: 15px;
            margin-top: 20px;
            flex-wrap: wrap;
        }
        .controls button {
            padding: 12px 24px;
            font-size: 18px;
            font-weight: bold;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            color: white;
            transition: 0.3s;
            box-shadow: 0 2px 5px rgba(0,0,0,0.2);
        }
        #btn-grade { background-color: #28a745; }
        #btn-grade:hover { background-color: #218838; }
        #btn-clear { background-color: #dc3545; }
        #btn-clear:hover { background-color: #c82333; }
        #btn-shuffle { background-color: #ffc107; color: #333; }
        #btn-shuffle:hover { background-color: #e0a800; }
        #btn-screenshot { background-color: #17a2b8; width: 100%; margin-top: 15px;}
        #btn-screenshot:hover { background-color: #138496; }

        #loading {
            display: none;
            text-align: center;
            font-size: 20px;
            color: #0056b3;
            margin: 20px 0;
            font-weight: bold;
        }
        #feedback {
            text-align: center;
            font-size: 20px;
            margin-top: 20px;
            padding: 15px;
            border-radius: 8px;
            background-color: #e9ecef;
            display: none;
        }
        .disclaimer {
            font-size: 12px;
            color: #666;
            text-align: center;
            margin-top: 10px;
        }
    </style>
</head>
<body>

<div class="container" id="app-container">
    <h1>📝 小五英文默書練習 - 寬畫布版</h1>
    
    <table id="dictation-table">
        <thead>
            <tr>
                <th width="5%">題號</th>
                <th width="15%">工具欄</th>
                <th width="55%">默寫區 (請在加闊的四線譜內書寫)</th>
                <th width="25%">正確答案</th>
            </tr>
        </thead>
        <tbody id="table-body">
            </tbody>
    </table>

    <div id="loading">⏳ AI 正在努力辨識你的手寫字體並批改中，請稍候...</div>
    
    <div id="feedback"></div>

    <div class="controls">
        <button id="btn-grade" onclick="gradeDictation()">✨ AI 自動批改</button>
        <button id="btn-clear" onclick="initApp()">🔄 清屏重默</button>
        <button id="btn-shuffle" onclick="shuffleWords()">🔀 次序打亂</button>
    </div>
    <div class="controls">
        <button id="btn-screenshot" onclick="takeScreenshot()">📸 成績表截圖下載到相片簿再上傳padlet</button>
    </div>
    
    <p class="disclaimer">* 注意：AI 手寫辨識（OCR）對於連筆字或太過潦草的字體可能會有誤差。請盡量端正書寫。系統嚴格區分大小寫。</p>
</div>

<script>
    const originalVocab = [
        "earrings", "necklace", "ring", "diamond",
        "gold", "silver", "spotted", "striped",
        "curly", "straight", "turnip cakes", "reunion dinner"
    ];
    let currentVocab = [...originalVocab];
    let isDrawing = false;

    // 初始化應用程式
    function initApp() {
        document.getElementById('feedback').style.display = 'none';
        document.getElementById('loading').style.display = 'none';
        renderTable();
    }

    // 渲染表格
    function renderTable() {
        const tbody = document.getElementById('table-body');
        tbody.innerHTML = '';

        currentVocab.forEach((word, index) => {
            const tr = document.createElement('tr');
            const words = word.split(' '); // 處理雙字詞

            // 1. 題號
            let tdNo = `<td style="font-weight:bold; font-size:18px;">${index + 1}</td>`;
            
            // 2. 工具欄
            let tdTools = `
                <td class="tools">
                    <button onclick="playAudio('${word}')" title="發音">🔊</button>
                    <button id="pen-${index}" class="active" onclick="setTool(${index}, 'pen')" title="畫筆">🖊️</button>
                    <button id="eraser-${index}" onclick="setTool(${index}, 'eraser')" title="膠擦">🧽</button>
                </td>
            `;

            // 3. 默寫區
            let canvasesHTML = '';
            words.forEach((w, wIndex) => {
                canvasesHTML += `
                    <div class="word-group">
                        <div class="canvas-wrapper">
                            <div class="stave-line red" style="top: 0px;"></div>
                            <div class="stave-line blue" style="top: 40px;"></div>
                            <div class="stave-line blue" style="top: 80px;"></div>
                            <div class="stave-line red" style="top: 118px;"></div>
                            <canvas id="canvas-${index}-${wIndex}" class="draw-canvas row-${index}" width="350" height="120"></canvas>
                        </div>
                        <span id="mark-${index}-${wIndex}" class="mark"></span>
                    </div>
                `;
            });
            let tdCanvas = `<td class="canvas-area">${canvasesHTML}</td>`;

            // 4. 正確答案
            let tdAnswer = `<td><div id="answer-${index}" class="correct-answer-cell answer-hidden">${word}</div></td>`;

            tr.innerHTML = tdNo + tdTools + tdCanvas + tdAnswer;
            tbody.appendChild(tr);

            // 為畫布綁定繪圖事件
            words.forEach((w, wIndex) => {
                setupCanvas(`canvas-${index}-${wIndex}`);
            });
        });
    }

    // 設定畫布繪圖邏輯
    function setupCanvas(canvasId) {
        const canvas = document.getElementById(canvasId);
        const ctx = canvas.getContext('2d');
        ctx.lineCap = 'round';
        ctx.lineJoin = 'round';
        ctx.lineWidth = 4;
        ctx.strokeStyle = '#000000';
        ctx.globalCompositeOperation = 'source-over';

        function getPos(evt) {
            const rect = canvas.getBoundingClientRect();
            const clientX = evt.touches ? evt.touches[0].clientX : evt.clientX;
            const clientY = evt.touches ? evt.touches[0].clientY : evt.clientY;
            return {
                x: clientX - rect.left,
                y: clientY - rect.top
            };
        }

        const startDraw = (e) => {
            isDrawing = true;
            const pos = getPos(e);
            ctx.beginPath();
            ctx.moveTo(pos.x, pos.y);
            e.preventDefault();
        };

        const draw = (e) => {
            if (!isDrawing) return;
            const pos = getPos(e);
            ctx.lineTo(pos.x, pos.y);
            ctx.stroke();
            e.preventDefault();
        };

        const stopDraw = (e) => {
            if (isDrawing) {
                ctx.closePath();
                isDrawing = false;
            }
            e.preventDefault();
        };

        // 滑鼠事件
        canvas.addEventListener('mousedown', startDraw);
        canvas.addEventListener('mousemove', draw);
        canvas.addEventListener('mouseup', stopDraw);
        canvas.addEventListener('mouseout', stopDraw);

        // 觸控事件
        canvas.addEventListener('touchstart', startDraw, {passive: false});
        canvas.addEventListener('touchmove', draw, {passive: false});
        canvas.addEventListener('touchend', stopDraw, {passive: false});
    }

    // 語音發音
    function playAudio(text) {
        if ('speechSynthesis' in window) {
            const utterance = new SpeechSynthesisUtterance(text);
            utterance.lang = 'en-GB';
            utterance.rate = 0.8;
            window.speechSynthesis.speak(utterance);
        } else {
            alert("你的瀏覽器不支援語音功能。");
        }
    }

    // 切換畫筆與膠擦
    function setTool(rowIndex, tool) {
        document.getElementById(`pen-${rowIndex}`).classList.remove('active');
        document.getElementById(`eraser-${rowIndex}`).classList.remove('active');
        document.getElementById(`${tool}-${rowIndex}`).classList.add('active');

        const canvases = document.querySelectorAll(`.row-${rowIndex}`);
        canvases.forEach(canvas => {
            const ctx = canvas.getContext('2d');
            if (tool === 'pen') {
                ctx.globalCompositeOperation = 'source-over';
                ctx.lineWidth = 4;
            } else if (tool === 'eraser') {
                ctx.globalCompositeOperation = 'destination-out';
                ctx.lineWidth = 25;
            }
        });
    }

    //
